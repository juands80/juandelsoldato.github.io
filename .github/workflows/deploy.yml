name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
      - run: npm run build
      - uses: actions/configure-pages@v4
      - name: Clean duplicate artifacts
        run: |
          ids=$(gh api "/repos/${{ github.repository }}/actions/artifacts" \
            --jq '.artifacts[] | select(.name == "github-pages" and .workflow_run.id == ${{ github.run_id }}) | .id')
          if [ -n "$ids" ]; then
            for id in $ids; do
              gh api -X DELETE "/repos/${{ github.repository }}/actions/artifacts/$id"
            done
          fi
        shell: bash
      - uses: actions/upload-pages-artifact@v5
        with:
          path: out
      - id: deployment
        uses: actions/deploy-pages@v5
